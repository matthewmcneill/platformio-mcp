<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <title>WiFi Setup</title>
    <style>
        body { padding: 1rem; }
        main { max-width: 400px; margin: auto; }
        .success { color: #4caf50; display: none; margin-top: 1rem; }
    </style>
</head>
<body>
    <main class="container">
        <article>
            <header>
                <strong>Network Configuration</strong>
            </header>
            <form id="wifiForm">
                <label for="ssid">SSID</label>
                <input type="text" id="ssid" name="ssid" placeholder="Network Name" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••">
                
                <button type="submit" id="saveBtn">Save Settings</button>
            </form>
            <div id="status" class="success">Settings saved! Device will reboot.</div>
        </article>
    </main>

    <script>
        document.getElementById('wifiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.ariaBusy = "true";
            saveBtn.disabled = true;

            const data = {
                ssid: document.getElementById('ssid').value,
                pass: document.getElementById('password').value
            };

            fetch('/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status').style.display = 'block';
                saveBtn.ariaBusy = "false";
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Save failed!');
                saveBtn.ariaBusy = "false";
                saveBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
